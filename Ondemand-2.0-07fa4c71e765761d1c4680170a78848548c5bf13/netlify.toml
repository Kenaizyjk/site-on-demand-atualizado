# ============================================
# NETLIFY CONFIGURATION
# On Demand Digital - Marketing Digital
# ============================================

[build]
  command = "npm ci --legacy-peer-deps && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10.9.2"
  NEXT_TELEMETRY_DISABLED = "1"
  BASELINE_BROWSER_MAPPING_IGNORE_OLD_DATA = "true"

# ============================================
# PLUGINS
# ============================================
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ============================================
# REDIRECTS
# ============================================

# Redirect www to non-www
[[redirects]]
  from = "https://www.ondemanddigital.com/*"
  to = "https://ondemanddigital.com/:splat"
  status = 301
  force = true

# Old URL patterns (if any)
[[redirects]]
  from = "/old-services"
  to = "/#services"
  status = 301

# ============================================
# HEADERS - SECURITY & PERFORMANCE
# ============================================

# Global Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Cache Headers - Static Assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache Headers - Icons & Manifest
[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    Content-Type = "application/manifest+json"

# Cache Headers - SEO Files
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml"

# ============================================
# FUNCTIONS CONFIGURATION
# ============================================

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Function: Submit Lead
[functions."submit-lead"]
  included_files = ["lib/**"]

# Function: Chat AI
[functions."chat-ai"]
  included_files = ["lib/**"]

# Function: Analyze SEO
[functions."analyze-seo"]
  included_files = ["lib/**"]

# ============================================
# DEVELOPMENT SERVER
# ============================================

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  autoLaunch = false
  framework = "#custom"

# ============================================
# CONTEXT-SPECIFIC BUILDS
# ============================================

# Production Build
[context.production]
  # environment = { NODE_ENV = "production" }  # Comentado: pode causar npm pular devDependencies

# Deploy Preview
[context.deploy-preview]
  # environment = { NODE_ENV = "production" }  # Comentado: pode causar npm pular devDependencies

# Branch Deploys
[context.branch-deploy]
  # environment = { NODE_ENV = "production" }  # Comentado: pode causar npm pular devDependencies

